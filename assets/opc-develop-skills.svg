    <text x="335" y="577">≤150 lines, decisions</text>
    <text x="515" y="556">prototype in real code</text>
    <text x="515" y="577">+ mock inventory</text>
    <text x="695" y="556">prd.md (AC-IDs)</text>
    <text x="695" y="577">technical.md (TD ADRs)</text>
    <text x="875" y="556">contracts/C-XX</text>
    <text x="875" y="577">spec+plan merged</text>
    <text x="1055" y="556">TDD RED/GREEN</text>
    <text x="1055" y="577">mock retirement</text>
    <text x="1235" y="556">Tier-1 E2E + triangle</text>
    <text x="1235" y="577">acceptance.md</text>
    <text x="1405" y="556">release gates</text>
    <text x="1405" y="577">rollback ready</text>
  </g>

  <!-- ═══════════ GATE BAND ═══════════ -->
  <rect x="250" y="620" width="1230" height="96" rx="10" fill="#dff4f4" stroke="#5a4632" stroke-width="2.5"/>
  <text x="865" y="658" text-anchor="middle" font-size="23" font-weight="bold" fill="#123">gates — fresh reviewer subagent + rubric, per artifact</text>
  <text x="865" y="692" text-anchor="middle" font-size="19" fill="#345">L0 precheck (validate_artifacts.py) · content-SHA freshness (check_freshness.py) · one status token · 2-round stop-loss</text>

  <!-- gate diamonds connecting pipeline to gate band -->
  <g fill="#fff" stroke="#5a4632" stroke-width="2">
    <path d="M 335 596 l 12 12 l -12 12 l -12 -12 z"/>
    <path d="M 695 596 l 12 12 l -12 12 l -12 -12 z"/>
    <path d="M 875 596 l 12 12 l -12 12 l -12 -12 z"/>
    <path d="M 1055 596 l 12 12 l -12 12 l -12 -12 z"/>
    <path d="M 1235 596 l 12 12 l -12 12 l -12 -12 z"/>
  </g>

  <!-- ═══════════ FEEDBACK / REVISE ═══════════ -->
  <rect x="250" y="760" width="1230" height="130" rx="10" fill="#fff8ec" stroke="#b26a00" stroke-width="2.5"/>
  <text x="865" y="798" text-anchor="middle" font-size="23" font-weight="bold" fill="#7a4a00">feedback — tune · revise · park</text>
  <text x="865" y="832" text-anchor="middle" font-size="19" fill="#7a4a00">revise → earliest broken layer, downstream approvals go SHA-stale, replay forward</text>
  <text x="865" y="862" text-anchor="middle" font-size="19" fill="#7a4a00">acceptance triage: implementation defect → build · artifact defect → revise · taste change → brainstorm (not rework)</text>

