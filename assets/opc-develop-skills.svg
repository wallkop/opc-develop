  <!-- 7 skills: brainstorm demo design contract build verify ship -->
  <g font-size="23" font-weight="bold" fill="#123">
    <!-- brainstorm -->
    <circle cx="335" cy="430" r="16" fill="#ffb300" stroke="#8a5a00" stroke-width="2"/>
    <text x="335" y="437" text-anchor="middle" font-size="18" fill="#4a3000">1</text>
    <rect x="250" y="455" width="170" height="72" rx="10" fill="#7fd8d8" stroke="#5a4632" stroke-width="2.5"/>
