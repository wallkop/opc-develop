    <rect x="256" y="182" width="170" height="76" rx="6" fill="#d9d9d9"/>
    <text x="341" y="215" text-anchor="middle" font-size="18" fill="#222">one-command</text>
    <text x="341" y="240" text-anchor="middle" font-size="18" fill="#222">up · health</text>
    <rect x="442" y="182" width="170" height="76" rx="6" fill="#d9d9d9"/>
