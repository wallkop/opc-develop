    <!-- demo -->
    <circle cx="452" cy="430" r="16" fill="#ffb300" stroke="#8a5a00" stroke-width="2"/>
    <text x="452" y="437" text-anchor="middle" font-size="18" fill="#4a3000">2</text>
    <rect x="430" y="455" width="170" height="72" rx="10" fill="#7fd8d8" stroke="#5a4632" stroke-width="2.5"/>
    <text x="515" y="498" text-anchor="middle">demo</text>
    <!-- design -->
    <circle cx="695" cy="430" r="16" fill="#ffb300" stroke="#8a5a00" stroke-width="2"/>
    <text x="695" y="437" text-anchor="middle" font-size="18" fill="#4a3000">3</text>
    <rect x="610" y="455" width="170" height="72" rx="10" fill="#7fd8d8" stroke="#5a4632" stroke-width="2.5"/>
    <text x="695" y="498" text-anchor="middle">design</text>
    <!-- contract -->
    <rect x="790" y="455" width="170" height="72" rx="10" fill="#7fd8d8" stroke="#5a4632" stroke-width="2.5"/>
    <text x="875" y="498" text-anchor="middle">contract</text>
    <!-- build -->
    <rect x="970" y="455" width="170" height="72" rx="10" fill="#7fd8d8" stroke="#5a4632" stroke-width="2.5"/>
    <text x="1055" y="498" text-anchor="middle">build</text>
    <!-- verify -->
    <circle cx="1235" cy="430" r="16" fill="#ffb300" stroke="#8a5a00" stroke-width="2"/>
    <text x="1235" y="437" text-anchor="middle" font-size="18" fill="#4a3000">4</text>
    <rect x="1150" y="455" width="170" height="72" rx="10" fill="#7fd8d8" stroke="#5a4632" stroke-width="2.5"/>
    <text x="1235" y="498" text-anchor="middle">verify</text>
    <!-- ship -->
    <rect x="1330" y="455" width="150" height="72" rx="10" fill="#7fd8d8" stroke="#5a4632" stroke-width="2.5"/>
    <text x="1405" y="498" text-anchor="middle">ship</text>
  </g>

  <!-- pipeline arrows -->
  <g stroke="#444" stroke-width="2.5" fill="none">
    <line x1="420" y1="491" x2="428" y2="491" marker-end="url(#arrow)"/>
    <line x1="600" y1="491" x2="608" y2="491" marker-end="url(#arrow)"/>
    <line x1="780" y1="491" x2="788" y2="491" marker-end="url(#arrow)"/>
    <line x1="960" y1="491" x2="968" y2="491" marker-end="url(#arrow)"/>
    <line x1="1140" y1="491" x2="1148" y2="491" marker-end="url(#arrow)"/>
    <line x1="1320" y1="491" x2="1328" y2="491" marker-end="url(#arrow)"/>
