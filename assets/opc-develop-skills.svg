  <text x="1695" y="470" text-anchor="middle" font-size="26" font-weight="bold" fill="#2a4a10">lite</text>
  <g font-size="19" fill="#365220" text-anchor="middle">
    <text x="1695" y="516">the 80% path</text>
    <text x="1695" y="552">current branch,</text>
    <text x="1695" y="578">zero ceremony</text>
    <text x="1695" y="622">targeted tests +</text>
    <text x="1695" y="648">before/after evidence</text>
    <text x="1695" y="692">bare-repo compatible</text>
    <text x="1695" y="736">escalates to Full on</text>
    <text x="1695" y="762">risk triggers</text>
    <text x="1695" y="806">resolved failures →</text>
    <text x="1695" y="832">error ledger too</text>
  </g>

  <!-- harness skill box on right -->
  <rect x="1540" y="920" width="310" height="120" rx="12" fill="#dff4f4" stroke="#5a4632" stroke-width="2.5"/>
  <text x="1695" y="968" text-anchor="middle" font-size="24" font-weight="bold" fill="#123">harness</text>
  <text x="1695" y="998" text-anchor="middle" font-size="18" fill="#345">score verbs by executing;</text>
  <text x="1695" y="1022" text-anchor="middle" font-size="18" fill="#345">build gaps as scripts/seeds</text>

  <!-- ═══════════ MEASURE BAND (LOOP C) ═══════════ -->
  <rect x="50" y="1130" width="160" height="180" rx="8" fill="#000"/>
  <text x="130" y="1205" text-anchor="middle" font-size="24" font-style="italic" font-weight="bold" fill="#fff">Measure</text>
  <text x="130" y="1237" text-anchor="middle" font-size="15" fill="#bbb">the loop that</text>
  <text x="130" y="1257" text-anchor="middle" font-size="15" fill="#bbb">improves the loop</text>

  <!-- ledgers -->
  <rect x="240" y="1130" width="380" height="180" rx="12" fill="#f0f0f0" stroke="#5a4632" stroke-width="2.5"/>
  <text x="430" y="1168" text-anchor="middle" font-size="22" font-weight="bold" fill="#123">ledgers (append-only JSONL)</text>
  <text x="430" y="1202" text-anchor="middle" font-size="18" fill="#345">features/&lt;slug&gt;/ledger.jsonl</text>
  <text x="430" y="1228" text-anchor="middle" font-size="17" fill="#666">gates · rework routing · evidence labels · gaps</text>
  <text x="430" y="1262" text-anchor="middle" font-size="18" fill="#345">docs/opc/error-ledger.jsonl</text>
  <text x="430" y="1288" text-anchor="middle" font-size="17" fill="#666">root causes captured at resolution time</text>

  <!-- retro -->
