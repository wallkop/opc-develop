    <path d="M 1235 760 C 1235 740, 1235 730, 1235 716" marker-end="url(#arrowAmber)" transform="rotate(180 1235 738)"/>
    <path d="M 335 760 C 335 745, 335 740, 335 730" marker-end="url(#arrowAmber)" transform="rotate(180 335 745)"/>
    <path d="M 695 760 C 695 745, 695 740, 695 730" marker-end="url(#arrowAmber)" transform="rotate(180 695 745)"/>
    <path d="M 1055 760 C 1055 745, 1055 740, 1055 730" marker-end="url(#arrowAmber)" transform="rotate(180 1055 745)"/>
  </g>

